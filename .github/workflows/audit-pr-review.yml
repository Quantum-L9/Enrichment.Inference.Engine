# --- L9_META ---
# l9_schema: 1
# origin: l9-template
# engine: enrichment
# layer: [ci, governance]
# tags: [L9_TEMPLATE, ci, audit, pr-review]
# owner: platform
# status: active
# --- /L9_META ---
# Audit PR Review - posts bounded findings as PR comments.

name: Audit PR Review

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**/*.py'
      - 'kb/**/*.yaml'
      - 'kb/**/*.yml'

concurrency:
  group: audit-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  PYTHON_VERSION: '3.12'
  MAX_COMMENT_FINDINGS_PER_SEVERITY: '25'
  MAX_COMMENT_LENGTH: '65536'

jobs:
  audit-review:
    name: L9 Audit Review
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run Audit Engine
        id: audit
        run: |
          if [ ! -f "tools/audit_engine.py" ]; then
            echo "audit_engine.py not found, skipping"
            echo "has_findings=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Running L9 27-rule audit..."
          PYTHONPATH=. python tools/audit_engine.py --json > audit_results.json 2>&1 || true

          if ! FINDING_COUNT=$(python3 -c "import json; data=json.load(open('audit_results.json')); print(len(data))" 2>&1); then
            echo "ERROR: Failed to parse audit_results.json"
            echo "$FINDING_COUNT"
            echo "has_findings=true" >> $GITHUB_OUTPUT
            echo "finding_count=PARSE_ERROR" >> $GITHUB_OUTPUT
            exit 1
          fi

          if ! [[ "$FINDING_COUNT" =~ ^[0-9]+$ ]]; then
            echo "ERROR: Invalid finding count: $FINDING_COUNT"
            echo "has_findings=true" >> $GITHUB_OUTPUT
            echo "finding_count=PARSE_ERROR" >> $GITHUB_OUTPUT
            exit 1
          fi

          if [ "$FINDING_COUNT" = "0" ]; then
            echo "No audit findings"
            echo "has_findings=false" >> $GITHUB_OUTPUT
          else
            echo "Found $FINDING_COUNT audit findings"
            echo "has_findings=true" >> $GITHUB_OUTPUT
            echo "finding_count=$FINDING_COUNT" >> $GITHUB_OUTPUT
          fi

          CRITICAL=$(python3 -c "import json; data=json.load(open('audit_results.json')); print(sum(1 for f in data if f['severity']=='CRITICAL'))")
          HIGH=$(python3 -c "import json; data=json.load(open('audit_results.json')); print(sum(1 for f in data if f['severity']=='HIGH'))")
          MEDIUM=$(python3 -c "import json; data=json.load(open('audit_results.json')); print(sum(1 for f in data if f['severity']=='MEDIUM'))")
          INFO=$(python3 -c "import json; data=json.load(open('audit_results.json')); print(sum(1 for f in data if f['severity']=='INFO'))")

          echo "critical_count=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high_count=$HIGH" >> $GITHUB_OUTPUT
          echo "medium_count=$MEDIUM" >> $GITHUB_OUTPUT
          echo "info_count=$INFO" >> $GITHUB_OUTPUT

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "should_block=true" >> $GITHUB_OUTPUT
          else
            echo "should_block=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate PR Comment
        if: steps.audit.outputs.has_findings == 'true'
        id: comment
        run: |
          python3 << 'EOF'
          import json
          import os

          MAX_PER_SEVERITY = int(os.environ.get('MAX_COMMENT_FINDINGS_PER_SEVERITY', '25'))
          MAX_COMMENT_LENGTH = int(os.environ.get('MAX_COMMENT_LENGTH', '65536'))
          MAX_LINE_LENGTH = 500

          with open('audit_results.json') as f:
              findings = json.load(f)

          if not findings:
              print('No findings to report')
              raise SystemExit(0)

          by_severity = {'CRITICAL': [], 'HIGH': [], 'MEDIUM': [], 'INFO': []}
          for finding in findings:
              by_severity[finding['severity']].append(finding)

          lines = []
          lines.append('<!-- l9-audit-marker: v1 -->')
          lines.append('## L9 Audit Review')
          lines.append('')

          critical = len(by_severity['CRITICAL'])
          high = len(by_severity['HIGH'])
          medium = len(by_severity['MEDIUM'])
          info = len(by_severity['INFO'])

          if critical > 0 or high > 0:
              lines.append('### Blocking Issues Found')
              lines.append('')
              lines.append(f'**{critical} CRITICAL** | **{high} HIGH** | {medium} MEDIUM | {info} INFO')
              lines.append('')
              lines.append('This PR cannot merge until CRITICAL and HIGH findings are resolved.')
          else:
              lines.append('### Non-Blocking Issues Found')
              lines.append('')
              lines.append(f'{medium} MEDIUM | {info} INFO')

          lines.append('')
          lines.append('---')
          lines.append('')

          severity_icons = {
              'CRITICAL': '[CRITICAL]',
              'HIGH': '[HIGH]',
              'MEDIUM': '[MEDIUM]',
              'INFO': '[INFO]',
          }

          current_length = len('\n'.join(lines))
          footer = '\n---\nGenerated by L9 Audit Engine (`tools/audit_engine.py`)'
          reserve_for_footer = len(footer) + 200
          truncated_findings = 0

          for severity in ['CRITICAL', 'HIGH', 'MEDIUM', 'INFO']:
              current = by_severity[severity]
              if not current:
                  continue

              header = f"### {severity_icons[severity]} {severity} ({len(current)})\n\n"
              if current_length + len(header) + reserve_for_footer > MAX_COMMENT_LENGTH:
                  truncated_findings += len(current)
                  continue

              lines.append(f"### {severity_icons[severity]} {severity} ({len(current)})")
              lines.append('')
              current_length += len(header)

              included_in_severity = 0
              for finding in current[:MAX_PER_SEVERITY]:
                  finding_msg = finding['message']
                  if len(finding_msg) > MAX_LINE_LENGTH:
                      finding_msg = finding_msg[:MAX_LINE_LENGTH] + '...'

                  finding_line = f"- `{finding['file']}:{finding['line']}` {finding_msg}\n"

                  if current_length + len(finding_line) + reserve_for_footer > MAX_COMMENT_LENGTH:
                      truncated_findings += len(current) - included_in_severity
                      break

                  lines.append(finding_line.rstrip())
                  current_length += len(finding_line)
                  included_in_severity += 1

              remaining = len(current) - min(MAX_PER_SEVERITY, included_in_severity)
              if remaining > 0:
                  truncation_notice = f"\n... truncated {remaining} additional {severity} findings ...\n"
                  if current_length + len(truncation_notice) + reserve_for_footer <= MAX_COMMENT_LENGTH:
                      lines.append('')
                      lines.append(f"... truncated {remaining} additional {severity} findings ...")
                      current_length += len(truncation_notice)

              lines.append('')
              current_length += 1

          if truncated_findings > 0:
              lines.append('')
              lines.append(f"... truncated {truncated_findings} additional findings due to comment length limit ...")
              lines.append('')

          lines.append('---')
          lines.append('Generated by L9 Audit Engine (`tools/audit_engine.py`)')

          comment_body = '\n'.join(lines)

          with open('pr_comment.md', 'w', encoding='utf-8') as handle:
              handle.write(comment_body)

          print(f'Generated bounded comment with {len(findings)} findings ({len(comment_body)} chars)')
          EOF

      - name: Post PR Comment
        if: steps.audit.outputs.has_findings == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const commentBody = fs.readFileSync('pr_comment.md', 'utf8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('<!-- l9-audit-marker: v1 -->')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }

      - name: Clear stale audit comment
        if: steps.audit.outputs.has_findings == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('<!-- l9-audit-marker: v1 -->')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: '<!-- l9-audit-marker: v1 -->\n## L9 Audit Review\n\nAll 27 rules pass. No audit findings remain.\n\nGenerated by L9 Audit Engine (`tools/audit_engine.py`)'
              });
            }

      - name: Fail on Blocking Issues
        if: steps.audit.outputs.should_block == 'true'
        run: |
          echo "CRITICAL or HIGH severity issues found"
          echo "CRITICAL: ${{ steps.audit.outputs.critical_count }}"
          echo "HIGH: ${{ steps.audit.outputs.high_count }}"
          exit 1

      - name: Audit Passed
        if: steps.audit.outputs.should_block != 'true'
        run: |
          echo "L9 Audit Review passed"
          echo "CRITICAL: ${{ steps.audit.outputs.critical_count }}"
          echo "HIGH: ${{ steps.audit.outputs.high_count }}"