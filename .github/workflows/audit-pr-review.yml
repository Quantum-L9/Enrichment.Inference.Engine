# --- L9_META ---
# l9_schema: 1
# origin: l9-template
# engine: enrichment
# layer: [ci, governance]
# tags: [L9_TEMPLATE, ci, audit, pr-review]
# owner: platform
# status: active
# --- /L9_META ---
# Audit PR Review - baseline-aware touched-file scoped blocking with repo-wide advisory visibility.

name: Audit PR Review

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**/*.py'
      - 'kb/**/*.yaml'
      - 'kb/**/*.yml'
      - '.github/workflows/**'
      - '.github/scripts/**'
      - '.github/governance/**'

concurrency:
  group: audit-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  PYTHON_VERSION: '3.12'
  MAX_COMMENT_FINDINGS_PER_SEVERITY: '25'
  MAX_COMMENT_LENGTH: '65536'
  AUDIT_BASELINE_PATH: '.github/governance/audit-baseline.json'

jobs:
  classify:
    name: Classify PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      pr_class: ${{ steps.classify.outputs.pr_class }}
      app_changed: ${{ steps.classify.outputs.app_changed }}
      python_changed: ${{ steps.classify.outputs.python_changed }}
      workflows_changed: ${{ steps.classify.outputs.workflows_changed }}
      scripts_changed: ${{ steps.classify.outputs.scripts_changed }}
      dependency_changed: ${{ steps.classify.outputs.dependency_changed }}
      security_sensitive_changed: ${{ steps.classify.outputs.security_sensitive_changed }}
      contracts_changed: ${{ steps.classify.outputs.contracts_changed }}
      adr_changed: ${{ steps.classify.outputs.adr_changed }}
      spec_changed: ${{ steps.classify.outputs.spec_changed }}
      transport_sensitive_changed: ${{ steps.classify.outputs.transport_sensitive_changed }}
      ingress_sensitive_changed: ${{ steps.classify.outputs.ingress_sensitive_changed }}
      all_changed_files: ${{ steps.classify.outputs.all_changed_files }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Classify changed files
        id: classify
        run: python3 .github/scripts/classify_pr.py

  audit-review:
    name: L9 Audit Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: classify
    if: needs.classify.outputs.pr_class != 'docs_only'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run Audit Engine
        id: audit
        env:
          PR_CLASS: ${{ needs.classify.outputs.pr_class }}
          APP_CHANGED: ${{ needs.classify.outputs.app_changed }}
          PYTHON_CHANGED: ${{ needs.classify.outputs.python_changed }}
          SECURITY_SENSITIVE_CHANGED: ${{ needs.classify.outputs.security_sensitive_changed }}
          TRANSPORT_SENSITIVE_CHANGED: ${{ needs.classify.outputs.transport_sensitive_changed }}
          INGRESS_SENSITIVE_CHANGED: ${{ needs.classify.outputs.ingress_sensitive_changed }}
          ALL_CHANGED_FILES: ${{ needs.classify.outputs.all_changed_files }}
          AUDIT_BASELINE_PATH: ${{ env.AUDIT_BASELINE_PATH }}
        run: |
          if [ ! -f "tools/audit_engine.py" ]; then
            echo "audit_engine.py not found, skipping"
            echo "has_findings=false" >> $GITHUB_OUTPUT
            echo "should_block=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Running L9 27-rule audit..."
          PYTHONPATH=. python tools/audit_engine.py --json > audit_results.json 2>&1 || true

          python3 << 'PY'
          import json
          import os
          import re
          import sys
          from pathlib import PurePosixPath

          def normalize_path(value: object) -> str:
              text = str(value or '').replace('\\', '/').strip()
              while text.startswith('./'):
                  text = text[2:]
              return str(PurePosixPath(text)) if text else ''

          def normalize_text(value: object) -> str:
              return re.sub(r'\s+', ' ', str(value or '').strip().lower())

          def parse_changed_files(raw: str) -> set[str]:
              try:
                  parsed = json.loads(raw or '[]')
              except json.JSONDecodeError as exc:
                  print(f'ERROR: Failed to parse classifier changed files JSON: {exc}', file=sys.stderr)
                  raise SystemExit(2)
              if not isinstance(parsed, list):
                  print('ERROR: classifier all_changed_files output must be a JSON list', file=sys.stderr)
                  raise SystemExit(2)
              return {normalize_path(path) for path in parsed if normalize_path(path)}

          def finding_rule(finding: dict) -> str:
              explicit_rule = normalize_text(finding.get('rule'))
              if explicit_rule:
                  return explicit_rule
              message = normalize_text(finding.get('message'))
              if 'f-string sql' in message or 'sql query' in message:
                  return 'f_string_sql'
              if 'fastapi import' in message or 'chassis isolation' in message:
                  return 'fastapi_import_engine'
              if 'flatcase field' in message:
                  return 'flatcase_field'
              return 'unknown_rule'

          def finding_key(finding: dict) -> str:
              return '|'.join(
                  (
                      normalize_path(finding.get('file')),
                      finding_rule(finding),
                      normalize_text(finding.get('message')),
                  )
              )

          def is_security_or_chassis_finding(finding: dict) -> bool:
              message = normalize_text(finding.get('message'))
              rule = finding_rule(finding)
              joined = f'{rule} {message}'
              return any(
                  token in joined
                  for token in (
                      'sql',
                      'injection',
                      'secret',
                      'auth',
                      'security',
                      'fastapi import',
                      'chassis',
                      'transport',
                      'ingress',
                  )
              )

          def load_baseline(path: str) -> set[str]:
              if not path:
                  print('ERROR: AUDIT_BASELINE_PATH is empty', file=sys.stderr)
                  raise SystemExit(2)
              try:
                  baseline = json.load(open(path, encoding='utf-8'))
              except Exception as exc:
                  print(f'ERROR: Failed to parse audit baseline {path}: {exc}', file=sys.stderr)
                  raise SystemExit(2)
              if not isinstance(baseline, dict):
                  print('ERROR: audit baseline must be a JSON object', file=sys.stderr)
                  raise SystemExit(2)
              if baseline.get('schema_version') != 1:
                  print('ERROR: audit baseline schema_version must be 1', file=sys.stderr)
                  raise SystemExit(2)
              findings = baseline.get('findings')
              if not isinstance(findings, list):
                  print('ERROR: audit baseline findings must be a list', file=sys.stderr)
                  raise SystemExit(2)
              keys = set()
              for index, finding in enumerate(findings):
                  if not isinstance(finding, dict):
                      print(f'ERROR: audit baseline finding at index {index} must be an object', file=sys.stderr)
                      raise SystemExit(2)
                  key = finding_key(finding)
                  if key.startswith('|') or key.endswith('|'):
                      print(f'ERROR: audit baseline finding at index {index} has incomplete key fields', file=sys.stderr)
                      raise SystemExit(2)
                  keys.add(key)
              return keys

          try:
              findings = json.load(open('audit_results.json', encoding='utf-8'))
          except Exception as exc:
              print(f'ERROR: Failed to parse audit_results.json: {exc}', file=sys.stderr)
              raise SystemExit(2)

          if not isinstance(findings, list):
              print('ERROR: audit_results.json must be a list', file=sys.stderr)
              raise SystemExit(2)

          baseline_keys = load_baseline(os.environ.get('AUDIT_BASELINE_PATH', ''))
          changed = parse_changed_files(os.environ.get('ALL_CHANGED_FILES') or '[]')
          pr_class = os.environ.get('PR_CLASS', 'unknown')
          app_changed = os.environ.get('APP_CHANGED') == 'true'
          security_changed = os.environ.get('SECURITY_SENSITIVE_CHANGED') == 'true'
          transport_changed = os.environ.get('TRANSPORT_SENSITIVE_CHANGED') == 'true'
          ingress_changed = os.environ.get('INGRESS_SENSITIVE_CHANGED') == 'true'

          enriched_findings = []
          for finding in findings:
              if not isinstance(finding, dict):
                  print('ERROR: each audit finding must be an object', file=sys.stderr)
                  raise SystemExit(2)
              enriched = dict(finding)
              normalized_file = normalize_path(enriched.get('file'))
              key = finding_key(enriched)
              inherited = key in baseline_keys
              touched = normalized_file in changed
              dangerous = is_security_or_chassis_finding(enriched)
              severity = str(enriched.get('severity', '')).upper()
              new = not inherited
              blocking = False

              if new and severity in {'CRITICAL', 'HIGH'}:
                  blocking = True
              if touched and dangerous:
                  blocking = True
              if touched and new and severity in {'CRITICAL', 'HIGH'}:
                  blocking = True

              enriched['_l9_key'] = key
              enriched['_l9_inherited'] = inherited
              enriched['_l9_new'] = new
              enriched['_l9_touched'] = touched
              enriched['_l9_dangerous'] = dangerous
              enriched['_l9_blocking'] = blocking
              enriched_findings.append(enriched)

          inherited_findings = [finding for finding in enriched_findings if finding['_l9_inherited']]
          new_findings = [finding for finding in enriched_findings if finding['_l9_new']]
          touched_findings = [finding for finding in enriched_findings if finding['_l9_touched']]
          blocking_findings = [finding for finding in enriched_findings if finding['_l9_blocking']]
          touched_baseline_blocking_findings = [
              finding
              for finding in enriched_findings
              if finding['_l9_inherited'] and finding['_l9_touched'] and finding['_l9_dangerous']
          ]
          new_blocking_findings = [
              finding
              for finding in enriched_findings
              if finding['_l9_new'] and finding['_l9_blocking']
          ]
          inherited_advisory_findings = [
              finding
              for finding in inherited_findings
              if not finding['_l9_blocking']
          ]

          payload = {
              'schema_version': 2,
              'mode': 'baseline_aware_touched_file_scoped_blocking',
              'pr_class': pr_class,
              'changed_files': sorted(changed),
              'blocking_context': bool(app_changed or security_changed or transport_changed or ingress_changed or pr_class in {'app_code', 'security', 'compliance', 'unknown_diff'}),
              'baseline_finding_count': len(baseline_keys),
              'finding_count': len(enriched_findings),
              'new_finding_count': len(new_findings),
              'inherited_finding_count': len(inherited_findings),
              'touched_finding_count': len(touched_findings),
              'blocking_finding_count': len(blocking_findings),
              'new_blocking_finding_count': len(new_blocking_findings),
              'touched_baseline_blocking_finding_count': len(touched_baseline_blocking_findings),
              'findings': enriched_findings,
              'new_findings': new_findings,
              'inherited_findings': inherited_findings,
              'touched_findings': touched_findings,
              'blocking_findings': blocking_findings,
              'new_blocking_findings': new_blocking_findings,
              'touched_baseline_blocking_findings': touched_baseline_blocking_findings,
              'inherited_advisory_findings': inherited_advisory_findings,
          }
          json.dump(payload, open('audit_summary.json', 'w', encoding='utf-8'), indent=2)

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              handle.write(f"has_findings={'true' if enriched_findings else 'false'}\n")
              handle.write(f"finding_count={len(enriched_findings)}\n")
              handle.write(f"new_finding_count={len(new_findings)}\n")
              handle.write(f"inherited_finding_count={len(inherited_findings)}\n")
              handle.write(f"touched_finding_count={len(touched_findings)}\n")
              handle.write(f"blocking_finding_count={len(blocking_findings)}\n")
              handle.write(f"should_block={'true' if blocking_findings else 'false'}\n")
          PY

      - name: Generate PR Comment
        if: steps.audit.outputs.has_findings == 'true'
        id: comment
        run: |
          python3 << 'EOF'
          import json
          import os

          MAX_PER_SEVERITY = int(os.environ.get('MAX_COMMENT_FINDINGS_PER_SEVERITY', '25'))
          MAX_COMMENT_LENGTH = int(os.environ.get('MAX_COMMENT_LENGTH', '65536'))
          MAX_LINE_LENGTH = 500

          payload = json.load(open('audit_summary.json', encoding='utf-8'))
          blocking_findings = payload['blocking_findings']
          new_blocking_findings = payload['new_blocking_findings']
          touched_baseline_blocking_findings = payload['touched_baseline_blocking_findings']
          inherited_advisory_findings = payload['inherited_advisory_findings']
          new_findings = payload['new_findings']

          def public_finding(finding):
              return {key: value for key, value in finding.items() if not key.startswith('_l9_')}

          def append_finding_section(lines, title, findings, current_length):
              findings = [public_finding(finding) for finding in findings]
              if not findings:
                  lines.append(f'### {title}')
                  lines.append('')
                  lines.append('- none')
                  lines.append('')
                  return current_length + len(title) + 12

              by_severity = {'CRITICAL': [], 'HIGH': [], 'MEDIUM': [], 'INFO': []}
              for finding in findings:
                  by_severity.setdefault(str(finding.get('severity', 'INFO')).upper(), []).append(finding)

              lines.append(f'### {title}')
              lines.append('')
              current_length += len(title) + 8
              severity_icons = {'CRITICAL': '[CRITICAL]', 'HIGH': '[HIGH]', 'MEDIUM': '[MEDIUM]', 'INFO': '[INFO]'}
              footer = '\n---\nGenerated by L9 Audit Engine (`tools/audit_engine.py`)'
              reserve_for_footer = len(footer) + 200

              for severity in ['CRITICAL', 'HIGH', 'MEDIUM', 'INFO']:
                  current = by_severity.get(severity, [])
                  if not current:
                      continue
                  header = f"#### {severity_icons[severity]} {severity} ({len(current)})\n\n"
                  if current_length + len(header) + reserve_for_footer > MAX_COMMENT_LENGTH:
                      continue
                  lines.append(f"#### {severity_icons[severity]} {severity} ({len(current)})")
                  lines.append('')
                  current_length += len(header)
                  included = 0
                  for finding in current[:MAX_PER_SEVERITY]:
                      msg = str(finding.get('message', ''))
                      if len(msg) > MAX_LINE_LENGTH:
                          msg = msg[:MAX_LINE_LENGTH] + '...'
                      line = f"- `{finding.get('file')}:{finding.get('line')}` {msg}\n"
                      if current_length + len(line) + reserve_for_footer > MAX_COMMENT_LENGTH:
                          break
                      lines.append(line.rstrip())
                      current_length += len(line)
                      included += 1
                  remaining = len(current) - min(MAX_PER_SEVERITY, included)
                  if remaining > 0:
                      notice = f"... truncated {remaining} additional {severity} findings ..."
                      if current_length + len(notice) + reserve_for_footer <= MAX_COMMENT_LENGTH:
                          lines.append('')
                          lines.append(notice)
                          current_length += len(notice) + 2
                  lines.append('')
                  current_length += 1
              return current_length

          lines = []
          lines.append('<!-- l9-audit-marker: v1 -->')
          lines.append('## L9 Audit Review')
          lines.append('')
          lines.append('### Status')
          lines.append(f"- Result: `{'blocking' if blocking_findings else 'pass_with_advisories'}`")
          lines.append('- Mode: `baseline_aware_touched_file_scoped_blocking`')
          lines.append(f"- PR class: `{payload['pr_class']}`")
          lines.append(f"- Baseline findings registered: **{payload['baseline_finding_count']}**")
          lines.append(f"- Total repo findings visible: **{payload['finding_count']}**")
          lines.append(f"- New findings: **{payload['new_finding_count']}**")
          lines.append(f"- Inherited advisory findings: **{payload['inherited_finding_count']}**")
          lines.append(f"- Touched findings: **{payload['touched_finding_count']}**")
          lines.append(f"- Blocking findings: **{payload['blocking_finding_count']}**")
          lines.append('')

          if blocking_findings:
              lines.append('This PR is blocked by new HIGH/CRITICAL findings or touched dangerous baseline findings.')
          else:
              lines.append('No blocking baseline-aware audit findings were found. Inherited untouched findings remain visible but advisory.')
          lines.append('')
          lines.append('---')
          lines.append('')

          current_length = len('\n'.join(lines))
          current_length = append_finding_section(lines, 'Blocking New Findings', new_blocking_findings, current_length)
          current_length = append_finding_section(lines, 'Blocking Touched Baseline Findings', touched_baseline_blocking_findings, current_length)
          current_length = append_finding_section(lines, 'New Advisory Findings', [finding for finding in new_findings if finding not in new_blocking_findings], current_length)
          current_length = append_finding_section(lines, 'Inherited Advisory Findings', inherited_advisory_findings, current_length)

          lines.append('---')
          lines.append('Generated by L9 Audit Engine (`tools/audit_engine.py`)')
          comment_body = '\n'.join(lines)
          if len(comment_body) > MAX_COMMENT_LENGTH:
              comment_body = comment_body[: MAX_COMMENT_LENGTH - 120] + '\n\n... truncated due to GitHub comment limit ...\n---\nGenerated by L9 Audit Engine (`tools/audit_engine.py`)'

          with open('pr_comment.md', 'w', encoding='utf-8') as handle:
              handle.write(comment_body)
          print(f'Generated baseline-aware audit comment ({len(comment_body)} chars)')
          EOF

      - name: Post PR Comment
        if: steps.audit.outputs.has_findings == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const commentBody = fs.readFileSync('pr_comment.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number });
            const existingComment = comments.find(c => c.user.login === 'github-actions[bot]' && c.body.includes('<!-- l9-audit-marker: v1 -->'));
            if (existingComment) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existingComment.id, body: commentBody });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: commentBody });
            }

      - name: Clear stale audit comment
        if: steps.audit.outputs.has_findings == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number });
            const existingComment = comments.find(c => c.user.login === 'github-actions[bot]' && c.body.includes('<!-- l9-audit-marker: v1 -->'));
            if (existingComment) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existingComment.id, body: '<!-- l9-audit-marker: v1 -->\n## L9 Audit Review\n\nAll 27 rules pass. No audit findings remain.\n\nGenerated by L9 Audit Engine (`tools/audit_engine.py`)' });
            }

      - name: Fail on Blocking Issues
        if: steps.audit.outputs.should_block == 'true'
        run: |
          echo "Blocking baseline-aware audit findings found"
          echo "Blocking findings: ${{ steps.audit.outputs.blocking_finding_count }}"
          exit 1

      - name: Audit Passed
        if: steps.audit.outputs.should_block != 'true'
        run: |
          echo "L9 Audit Review passed with baseline-aware enforcement"
          echo "Total findings: ${{ steps.audit.outputs.finding_count }}"
          echo "New findings: ${{ steps.audit.outputs.new_finding_count }}"
          echo "Inherited advisory findings: ${{ steps.audit.outputs.inherited_finding_count }}"
          echo "Touched findings: ${{ steps.audit.outputs.touched_finding_count }}"