# --- L9_META ---
# l9_schema: 1
# origin: l9-template
# engine: enrichment
# layer: [ci, governance]
# tags: [L9_TEMPLATE, ci, audit, pr-review]
# owner: platform
# status: active
# --- /L9_META ---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Audit PR Review — Posts findings as PR comments
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# VERSION: 1.0.0
# PURPOSE: Run 27-rule audit engine on PRs and post findings as comments
#          so agents/developers can patch issues before merge.
#
# BLOCKING: CRITICAL and HIGH severity findings block merge.
# COMMENT: Findings are summarized to avoid GitHub comment size limits.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: Audit PR Review

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**/*.py'
      - 'kb/**/*.yaml'
      - 'kb/**/*.yml'

concurrency:
  group: audit-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  PYTHON_VERSION: '3.12'
  MAX_COMMENT_FINDINGS_PER_SEVERITY: '25'

jobs:
  audit-review:
    name: L9 Audit Review
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run Audit Engine
        id: audit
        run: |
          if [ ! -f "tools/audit_engine.py" ]; then
            echo "audit_engine.py not found, skipping"
            echo "has_findings=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Running L9 27-rule audit..."
          PYTHONPATH=. python tools/audit_engine.py --json > audit_results.json 2>&1 || true

          FINDING_COUNT=$(python3 -c "import json; data=json.load(open('audit_results.json')); print(len(data))" 2>/dev/null || echo "0")

          if [ "$FINDING_COUNT" = "0" ]; then
            echo "No audit findings"
            echo "has_findings=false" >> $GITHUB_OUTPUT
          else
            echo "Found $FINDING_COUNT audit findings"
            echo "has_findings=true" >> $GITHUB_OUTPUT
            echo "finding_count=$FINDING_COUNT" >> $GITHUB_OUTPUT
          fi

          CRITICAL=$(python3 -c "import json; data=json.load(open('audit_results.json')); print(sum(1 for f in data if f['severity']=='CRITICAL'))" 2>/dev/null || echo "0")
          HIGH=$(python3 -c "import json; data=json.load(open('audit_results.json')); print(sum(1 for f in data if f['severity']=='HIGH'))" 2>/dev/null || echo "0")
          MEDIUM=$(python3 -c "import json; data=json.load(open('audit_results.json')); print(sum(1 for f in data if f['severity']=='MEDIUM'))" 2>/dev/null || echo "0")
          INFO=$(python3 -c "import json; data=json.load(open('audit_results.json')); print(sum(1 for f in data if f['severity']=='INFO'))" 2>/dev/null || echo "0")

          echo "critical_count=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high_count=$HIGH" >> $GITHUB_OUTPUT
          echo "medium_count=$MEDIUM" >> $GITHUB_OUTPUT
          echo "info_count=$INFO" >> $GITHUB_OUTPUT

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "should_block=true" >> $GITHUB_OUTPUT
          else
            echo "should_block=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate PR Comment
        if: steps.audit.outputs.has_findings == 'true'
        id: comment
        run: |
          python3 << 'EOF'
          import json
          import os

          MAX_PER_SEVERITY = int(os.environ.get('MAX_COMMENT_FINDINGS_PER_SEVERITY', '25'))

          with open('audit_results.json') as f:
              findings = json.load(f)

          if not findings:
              print('No findings to report')
              raise SystemExit(0)

          by_severity = {'CRITICAL': [], 'HIGH': [], 'MEDIUM': [], 'INFO': []}
          for finding in findings:
              by_severity[finding['severity']].append(finding)

          lines = []
          lines.append('## L9 Audit Review')
          lines.append('')

          critical = len(by_severity['CRITICAL'])
          high = len(by_severity['HIGH'])
          medium = len(by_severity['MEDIUM'])
          info = len(by_severity['INFO'])

          if critical > 0 or high > 0:
              lines.append('### Blocking Issues Found')
              lines.append('')
              lines.append(f'**{critical} CRITICAL** | **{high} HIGH** | {medium} MEDIUM | {info} INFO')
              lines.append('')
              lines.append('This PR cannot merge until CRITICAL and HIGH findings are resolved.')
          else:
              lines.append('### Non-Blocking Issues Found')
              lines.append('')
              lines.append(f'{medium} MEDIUM | {info} INFO')

          lines.append('')
          lines.append('---')
          lines.append('')

          severity_icons = {
              'CRITICAL': '[CRITICAL]',
              'HIGH': '[HIGH]',
              'MEDIUM': '[MEDIUM]',
              'INFO': '[INFO]',
          }

          for severity in ['CRITICAL', 'HIGH', 'MEDIUM', 'INFO']:
              current = by_severity[severity]
              if not current:
                  continue

              lines.append(f"### {severity_icons[severity]} {severity} ({len(current)})")
              lines.append('')

              for finding in current[:MAX_PER_SEVERITY]:
                  lines.append(f"- `{finding['file']}:{finding['line']}` {finding['message']}")

              remaining = len(current) - MAX_PER_SEVERITY
              if remaining > 0:
                  lines.append('')
                  lines.append(f"... truncated {remaining} additional {severity} findings ...")

              lines.append('')

          lines.append('---')
          lines.append('Generated by L9 Audit Engine (`tools/audit_engine.py`)')

          comment_body = '\n'.join(lines)

          with open('pr_comment.md', 'w', encoding='utf-8') as handle:
              handle.write(comment_body)

          print(f'Generated bounded comment with {len(findings)} findings')
          EOF

      - name: Post PR Comment
        if: steps.audit.outputs.has_findings == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const commentBody = fs.readFileSync('pr_comment.md', 'utf8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('L9 Audit Review')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }

      - name: Clear stale audit comment
        if: steps.audit.outputs.has_findings == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('L9 Audit Review')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: '## L9 Audit Review\n\nAll 27 rules pass. No audit findings remain.\n\nGenerated by L9 Audit Engine (`tools/audit_engine.py`)'
              });
            }

      - name: Fail on Blocking Issues
        if: steps.audit.outputs.should_block == 'true'
        run: |
          echo "CRITICAL or HIGH severity issues found"
          echo "CRITICAL: ${{ steps.audit.outputs.critical_count }}"
          echo "HIGH: ${{ steps.audit.outputs.high_count }}"
          exit 1

      - name: Audit Passed
        if: steps.audit.outputs.should_block != 'true'
        run: |
          echo "L9 Audit Review passed"
          echo "CRITICAL: ${{ steps.audit.outputs.critical_count }}"
          echo "HIGH: ${{ steps.audit.outputs.high_count }}"