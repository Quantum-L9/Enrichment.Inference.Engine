# --- L9_META ---
# l9_schema: 1
# origin: l9-template
# engine: enrichment
# layer: [ci, governance]
# tags: [L9_TEMPLATE, ci, audit, pr-review, baseline]
# owner: platform
# status: active
# --- /L9_META ---
# Audit PR Review - baseline-aware enforcement with inherited debt visibility.

name: Audit PR Review

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**/*.py'
      - 'kb/**/*.yaml'
      - 'kb/**/*.yml'
      - '.github/workflows/audit-pr-review.yml'
      - '.github/governance/audit-baseline.json'

concurrency:
  group: audit-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  PYTHON_VERSION: '3.12'
  AUDIT_BASELINE_PATH: '.github/governance/audit-baseline.json'
  MAX_COMMENT_FINDINGS_PER_SECTION: '25'
  MAX_COMMENT_LENGTH: '65536'

jobs:
  audit-review:
    name: L9 Audit Review
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run Audit Engine
        id: audit
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.sha }}
          AUDIT_BASELINE_PATH: ${{ env.AUDIT_BASELINE_PATH }}
        run: |
          if [ ! -f "tools/audit_engine.py" ]; then
            echo "audit_engine.py not found, skipping"
            echo "has_findings=false" >> $GITHUB_OUTPUT
            echo "should_block=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Running L9 27-rule audit..."
          PYTHONPATH=. python tools/audit_engine.py --json > audit_results.json 2>&1 || true

          python3 << 'PY'
          import json
          import os
          import re
          import subprocess
          import sys
          from pathlib import PurePosixPath

          def normalize_path(value: object) -> str:
              text = str(value or '').replace('\\', '/').strip()
              while text.startswith('./'):
                  text = text[2:]
              return str(PurePosixPath(text)) if text else ''

          def normalize_text(value: object) -> str:
              return re.sub(r'\s+', ' ', str(value or '').strip().lower())

          def changed_files() -> set[str]:
              base_ref = os.environ.get('BASE_REF')
              head_ref = os.environ.get('HEAD_REF')
              if not base_ref or not head_ref:
                  print('ERROR: BASE_REF and HEAD_REF are required', file=sys.stderr)
                  raise SystemExit(2)
              output = subprocess.check_output(
                  ['git', 'diff', '--name-only', base_ref, head_ref],
                  text=True,
              )
              return {normalize_path(path) for path in output.splitlines() if normalize_path(path)}

          def finding_rule(finding: dict) -> str:
              explicit_rule = normalize_text(finding.get('rule'))
              if explicit_rule:
                  return explicit_rule
              message = normalize_text(finding.get('message'))
              if 'f-string sql' in message or 'sql query' in message:
                  return 'f_string_sql'
              if 'fastapi import' in message or 'chassis isolation' in message:
                  return 'fastapi_import_engine'
              if 'flatcase field' in message:
                  return 'flatcase_field'
              return 'unknown_rule'

          def finding_key(finding: dict) -> str:
              return '|'.join(
                  (
                      normalize_path(finding.get('file')),
                      finding_rule(finding),
                      normalize_text(finding.get('message')),
                  )
              )

          def is_dangerous_finding(finding: dict) -> bool:
              message = normalize_text(finding.get('message'))
              rule = finding_rule(finding)
              joined = f'{rule} {message}'
              return any(
                  token in joined
                  for token in (
                      'sql',
                      'injection',
                      'secret',
                      'auth',
                      'security',
                      'fastapi import',
                      'chassis',
                      'transport',
                      'ingress',
                  )
              )

          def load_baseline(path: str) -> set[str]:
              try:
                  baseline = json.load(open(path, encoding='utf-8'))
              except Exception as exc:
                  print(f'ERROR: Failed to parse audit baseline {path}: {exc}', file=sys.stderr)
                  raise SystemExit(2)
              if not isinstance(baseline, dict):
                  print('ERROR: audit baseline must be a JSON object', file=sys.stderr)
                  raise SystemExit(2)
              if baseline.get('schema_version') != 1:
                  print('ERROR: audit baseline schema_version must be 1', file=sys.stderr)
                  raise SystemExit(2)
              findings = baseline.get('findings')
              if not isinstance(findings, list):
                  print('ERROR: audit baseline findings must be a list', file=sys.stderr)
                  raise SystemExit(2)
              keys = set()
              for index, finding in enumerate(findings):
                  if not isinstance(finding, dict):
                      print(f'ERROR: audit baseline finding at index {index} must be an object', file=sys.stderr)
                      raise SystemExit(2)
                  key = finding_key(finding)
                  if key.startswith('|') or key.endswith('|'):
                      print(f'ERROR: audit baseline finding at index {index} has incomplete key fields', file=sys.stderr)
                      raise SystemExit(2)
                  keys.add(key)
              return keys

          try:
              raw_findings = json.load(open('audit_results.json', encoding='utf-8'))
          except Exception as exc:
              print(f'ERROR: Failed to parse audit_results.json: {exc}', file=sys.stderr)
              raise SystemExit(2)

          if not isinstance(raw_findings, list):
              print('ERROR: audit_results.json must be a list', file=sys.stderr)
              raise SystemExit(2)

          baseline_keys = load_baseline(os.environ.get('AUDIT_BASELINE_PATH', ''))
          touched_files = changed_files()
          enriched_findings = []

          for raw in raw_findings:
              if not isinstance(raw, dict):
                  print('ERROR: each audit finding must be an object', file=sys.stderr)
                  raise SystemExit(2)
              finding = dict(raw)
              normalized_file = normalize_path(finding.get('file'))
              key = finding_key(finding)
              inherited = key in baseline_keys
              new = not inherited
              touched = normalized_file in touched_files
              dangerous = is_dangerous_finding(finding)
              severity = str(finding.get('severity', '')).upper()
              blocking = False

              if new and severity in {'CRITICAL', 'HIGH'}:
                  blocking = True
              if touched and dangerous:
                  blocking = True

              finding['_l9_inherited'] = inherited
              finding['_l9_new'] = new
              finding['_l9_touched'] = touched
              finding['_l9_dangerous'] = dangerous
              finding['_l9_blocking'] = blocking
              enriched_findings.append(finding)

          blocking_findings = [finding for finding in enriched_findings if finding['_l9_blocking']]
          new_findings = [finding for finding in enriched_findings if finding['_l9_new']]
          inherited_findings = [finding for finding in enriched_findings if finding['_l9_inherited']]
          touched_baseline_blocking_findings = [
              finding for finding in enriched_findings
              if finding['_l9_inherited'] and finding['_l9_touched'] and finding['_l9_dangerous']
          ]
          new_blocking_findings = [
              finding for finding in enriched_findings
              if finding['_l9_new'] and finding['_l9_blocking']
          ]
          inherited_advisory_findings = [
              finding for finding in inherited_findings
              if not finding['_l9_blocking']
          ]

          summary = {
              'schema_version': 1,
              'mode': 'baseline_aware_governance_debt',
              'changed_files': sorted(touched_files),
              'baseline_finding_count': len(baseline_keys),
              'finding_count': len(enriched_findings),
              'new_finding_count': len(new_findings),
              'inherited_finding_count': len(inherited_findings),
              'blocking_finding_count': len(blocking_findings),
              'blocking_findings': blocking_findings,
              'new_blocking_findings': new_blocking_findings,
              'touched_baseline_blocking_findings': touched_baseline_blocking_findings,
              'new_advisory_findings': [finding for finding in new_findings if not finding['_l9_blocking']],
              'inherited_advisory_findings': inherited_advisory_findings,
          }
          json.dump(summary, open('audit_summary.json', 'w', encoding='utf-8'), indent=2)

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              handle.write(f"has_findings={'true' if enriched_findings else 'false'}\n")
              handle.write(f"finding_count={len(enriched_findings)}\n")
              handle.write(f"new_finding_count={len(new_findings)}\n")
              handle.write(f"inherited_finding_count={len(inherited_findings)}\n")
              handle.write(f"blocking_finding_count={len(blocking_findings)}\n")
              handle.write(f"should_block={'true' if blocking_findings else 'false'}\n")
          PY

      - name: Generate PR Comment
        if: steps.audit.outputs.has_findings == 'true'
        id: comment
        run: |
          python3 << 'EOF'
          import json
          import os

          MAX_PER_SECTION = int(os.environ.get('MAX_COMMENT_FINDINGS_PER_SECTION', '25'))
          MAX_COMMENT_LENGTH = int(os.environ.get('MAX_COMMENT_LENGTH', '65536'))
          MAX_LINE_LENGTH = 500

          payload = json.load(open('audit_summary.json', encoding='utf-8'))

          def clean(finding):
              return {key: value for key, value in finding.items() if not key.startswith('_l9_')}

          def append_section(lines, title, findings):
              findings = [clean(finding) for finding in findings]
              lines.append(f'### {title}')
              lines.append('')
              if not findings:
                  lines.append('- none')
                  lines.append('')
                  return
              for finding in findings[:MAX_PER_SECTION]:
                  message = str(finding.get('message', ''))
                  if len(message) > MAX_LINE_LENGTH:
                      message = message[:MAX_LINE_LENGTH] + '...'
                  lines.append(f"- `{finding.get('file')}:{finding.get('line')}` {message}")
              remaining = len(findings) - MAX_PER_SECTION
              if remaining > 0:
                  lines.append('')
                  lines.append(f'... truncated {remaining} additional findings ...')
              lines.append('')

          lines = []
          lines.append('<!-- l9-audit-marker: v1 -->')
          lines.append('## L9 Audit Review')
          lines.append('')
          lines.append('### Status')
          lines.append(f"- Result: `{'blocking' if payload['blocking_finding_count'] else 'pass_with_advisories'}`")
          lines.append('- Mode: `baseline_aware_governance_debt`')
          lines.append(f"- Baseline findings registered: **{payload['baseline_finding_count']}**")
          lines.append(f"- Total findings visible: **{payload['finding_count']}**")
          lines.append(f"- New findings: **{payload['new_finding_count']}**")
          lines.append(f"- Inherited findings: **{payload['inherited_finding_count']}**")
          lines.append(f"- Blocking findings: **{payload['blocking_finding_count']}**")
          lines.append('')
          if payload['blocking_finding_count']:
              lines.append('This PR is blocked by new HIGH/CRITICAL findings or touched dangerous baseline findings.')
          else:
              lines.append('No blocking baseline-aware audit findings were found. Inherited findings remain visible but advisory.')
          lines.append('')
          lines.append('---')
          lines.append('')
          append_section(lines, 'Blocking New Findings', payload['new_blocking_findings'])
          append_section(lines, 'Blocking Touched Baseline Findings', payload['touched_baseline_blocking_findings'])
          append_section(lines, 'New Advisory Findings', payload['new_advisory_findings'])
          append_section(lines, 'Inherited Advisory Findings', payload['inherited_advisory_findings'])
          lines.append('---')
          lines.append('Generated by L9 Audit Engine (`tools/audit_engine.py`)')

          body = '\n'.join(lines)
          if len(body) > MAX_COMMENT_LENGTH:
              body = body[:MAX_COMMENT_LENGTH - 120] + '\n\n... truncated due to GitHub comment limit ...\n---\nGenerated by L9 Audit Engine (`tools/audit_engine.py`)'
          open('pr_comment.md', 'w', encoding='utf-8').write(body)
          print(f'Generated baseline-aware audit comment ({len(body)} chars)')
          EOF

      - name: Post PR Comment
        if: steps.audit.outputs.has_findings == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const commentBody = fs.readFileSync('pr_comment.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existingComment = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('<!-- l9-audit-marker: v1 -->')
            );
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }

      - name: Clear stale audit comment
        if: steps.audit.outputs.has_findings == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existingComment = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('<!-- l9-audit-marker: v1 -->')
            );
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: '<!-- l9-audit-marker: v1 -->\n## L9 Audit Review\n\nAll 27 rules pass. No audit findings remain.\n\nGenerated by L9 Audit Engine (`tools/audit_engine.py`)'
              });
            }

      - name: Fail on Blocking Issues
        if: steps.audit.outputs.should_block == 'true'
        run: |
          echo "Blocking baseline-aware audit findings found"
          echo "Blocking findings: ${{ steps.audit.outputs.blocking_finding_count }}"
          exit 1

      - name: Audit Passed
        if: steps.audit.outputs.should_block != 'true'
        run: |
          echo "L9 Audit Review passed with baseline-aware enforcement"
          echo "Total findings: ${{ steps.audit.outputs.finding_count }}"
          echo "New findings: ${{ steps.audit.outputs.new_finding_count }}"
          echo "Inherited findings: ${{ steps.audit.outputs.inherited_finding_count }}"
