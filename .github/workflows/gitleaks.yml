# --- L9_META ---
# l9_schema: 1
# origin: l9-implementer
# engine: enrichment
# layer: [ci, security]
# tags: [gitleaks, secrets, soc2-cc6.1]
# owner: platform
# status: active
# --- /L9_META ---
#
# Gitleaks secret scanning — hard CI gate (SOC 2 CC6.1)
#
# Distinct from gitguardian.yml:
#   - gitguardian.yml uses ggshield but SOFT-SKIPS when GITGUARDIAN_API_KEY is unset
#   - This workflow is a hard gate: always runs, no soft-skip path
#   - Uses repo-local .gitleaks.toml (10 L9-specific rules)
#
# Scanner: standalone `gitleaks` binary (NOT gitleaks-action).
#   gitleaks-action v2/v3 require a paid/free GITLEAKS_LICENSE for ORGANIZATION
#   accounts (Quantum-L9 is an org) regardless of repo visibility. The binary CLI
#   has no license gate, so this stays a free, hard blocking gate with no secret.
#   Pinned to a specific release per supply-chain hardening (see GITLEAKS_VERSION).
#   To update: bump GITLEAKS_VERSION and verify at
#   https://github.com/gitleaks/gitleaks/releases

name: Gitleaks Secret Scan

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Secret scanning (SOC 2 CC6.1)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history required for gitleaks --log-opts
          persist-credentials: false  # scan-only job — do not retain git push credentials

      - name: Install gitleaks (binary — no org license required)
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "Downloading gitleaks ${GITLEAKS_VERSION}"
          curl -sSfL "$url" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Gitleaks scan (SOC 2 CC6.1)
        # Hard fail — no soft-skip path. SOC 2 CC6.1 requires a blocking gate.
        # --exit-code 1 fails the job on any finding; full history scanned via `git`.
        run: |
          gitleaks git . \
            --config .gitleaks.toml \
            --redact \
            --exit-code 1 \
            --report-format sarif \
            --report-path gitleaks.sarif

      - name: Upload SARIF to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif
