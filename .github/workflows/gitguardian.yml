# --- L9_META ---
# l9_schema: 1
# origin: l9-template
# engine: enrichment
# layer: [ci, security]
# tags: [gitguardian, secrets]
# owner: platform
# status: active
# --- /L9_META ---
# Secret scan via GitGuardian ggshield (GitHub-hosted runners).
#
# Configure:
#   Repository secret: GITGUARDIAN_API_KEY (service account or PAT with scan scope).
#
# If the API key is unset, the workflow succeeds without scanning.

name: GitGuardian

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Decide whether to run GitGuardian
        id: gate
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        run: |
          if [ -n "$GITGUARDIAN_API_KEY" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GitGuardian skipped — add Actions secret GITGUARDIAN_API_KEY."
          fi

      - name: Checkout
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Pull request metadata for ggshield
        if: steps.gate.outputs.run == 'true' && github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: echo "GITHUB_PULL_BASE_SHA=${BASE_SHA}" >> "$GITHUB_ENV"

      - name: GitGuardian scan
        if: steps.gate.outputs.run == 'true'
        uses: GitGuardian/ggshield-action@v1
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
