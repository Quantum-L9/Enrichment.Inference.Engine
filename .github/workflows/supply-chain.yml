# Universal CI/CD Pack — Supply Chain Security
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# VERSION: 1.1.1
# CHANGES v1.1.0: Added CycloneDX SBOM generation job (SOC 2 CC9.2)
# CHANGES v1.1.1: Exact SPDX token matching in GPL/AGPL audit
#   - P1 fix: substring 'gpl' falsely matched 'lgpl' — use exact SPDX token set
#   - P2 fix: also inspect licenses[].license.name (not just id/expression)
# PURPOSE: License compliance, dependency review, SBOM generation
# SIBLING PARITY: Cognitive.Engine.Graphs/supply-chain.yml
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: Supply Chain Security

on:
  pull_request:
    branches:
      - ${{ vars.PRIMARY_BRANCH || 'main' }}
      - ${{ vars.DEVELOP_BRANCH || 'develop' }}
  push:
    branches:
      - ${{ vars.PRIMARY_BRANCH || 'main' }}
  schedule:
    - cron: '0 3 * * 1'  # Weekly on Monday at 3 AM UTC
  workflow_dispatch:

concurrency:
  group: supply-chain-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  id-token: write
  actions: read

env:
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION || '3.12' }}

jobs:
# ────────────────────────────────────────────────────────────────────────
# License Compliance
# ────────────────────────────────────────────────────────────────────────
  license-compliance:
    name: License Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || true
          pip install pip-licenses

      - name: Check License Compliance
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "License Compliance Report"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          ALLOWED="${{ vars.ALLOWED_LICENSES || 'MIT;BSD;Apache;ISC;PSF;MPL;LGPL;Unlicense;Public Domain' }}"
          DENIED="${{ vars.DENIED_LICENSES || 'GPL-3.0;AGPL;SSPL;EUPL' }}"

          pip-licenses --format=table --with-urls --order=license

          echo ""
          echo "Checking for denied licenses..."

          IFS=';' read -ra DENY_LIST <<< "$DENIED"
          VIOLATIONS=0
          for license in "${DENY_LIST[@]}"; do
            if pip-licenses --format=csv | grep -qi "$license"; then
              echo "❌ Found denied license: $license"
              pip-licenses --format=table | grep -i "$license"
              VIOLATIONS=$((VIOLATIONS + 1))
            fi
          done

          if [ $VIOLATIONS -gt 0 ]; then
            echo ""
            echo "❌ $VIOLATIONS license violation(s) found"
            exit 1
          fi

          echo "✅ All licenses are compliant"

      - name: Generate License Report
        run: |
          pip-licenses --format=json --with-urls --order=license > license-report.json
          pip-licenses --format=table --with-urls --order=license > license-report.txt

      - name: Upload License Report
        uses: actions/upload-artifact@v7
        with:
          name: license-report
          path: |
            license-report.json
            license-report.txt
          retention-days: 30

# ────────────────────────────────────────────────────────────────────────
# Dependency Review (PR only)
# ────────────────────────────────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: ${{ vars.PIP_LICENSES_DENY || 'GPL-3.0, AGPL-3.0' }}

# ────────────────────────────────────────────────────────────────────────
# CycloneDX SBOM Generation (SOC 2 CC9.2)
# ────────────────────────────────────────────────────────────────────────
  cyclonedx-sbom:
    name: CycloneDX SBOM (SOC 2 CC9.2)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run on push to main AND on PRs so SBOM is visible before merge
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies + cyclonedx-bom
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || true
          pip install cyclonedx-bom

      - name: Generate CycloneDX SBOM
        run: |
          mkdir -p artifacts
          cyclonedx-py environment --of json -o artifacts/sbom-eie.json
          echo "✅ SBOM generated: artifacts/sbom-eie.json"
          echo "Component count: $(python3 -c "import json; d=json.load(open('artifacts/sbom-eie.json')); print(len(d.get('components', [])))" 2>/dev/null || echo 'unknown')"

      - name: GPL/AGPL license audit (hard fail)
        # P1 fix: use exact SPDX token set — 'lgpl' no longer triggers the gate
        # P2 fix: inspect all three CycloneDX license fields:
        #   licenses[].expression, licenses[].license.id, licenses[].license.name
        run: |
          echo "Scanning SBOM for GPL/AGPL licenses (exact SPDX tokens)..."
          python3 - <<'PYEOF'
          import json, sys, re

          # Exact SPDX identifiers that are banned — LGPL is explicitly excluded
          BANNED_SPDX = {
              "GPL-2.0", "GPL-2.0-only", "GPL-2.0-or-later",
              "GPL-3.0", "GPL-3.0-only", "GPL-3.0-or-later",
              "AGPL-1.0", "AGPL-1.0-only", "AGPL-1.0-or-later",
              "AGPL-3.0", "AGPL-3.0-only", "AGPL-3.0-or-later",
          }

          # Token-based pattern for expression strings (e.g. "GPL-3.0 OR MIT")
          # Matches exact SPDX tokens; does NOT match LGPL-2.0 etc.
          BANNED_PATTERN = re.compile(
              r'(?<![A-Za-z-])(' + '|'.join(re.escape(t) for t in BANNED_SPDX) + r')(?![A-Za-z0-9.-])'
          )

          with open('artifacts/sbom-eie.json') as f:
              sbom = json.load(f)

          hits = []
          for comp in sbom.get('components', []):
              name = comp.get('name', '?')
              for lic in comp.get('licenses', []):
                  # Field 1: expression (e.g. "GPL-3.0 OR MIT")
                  expr = lic.get('expression', '') or ''
                  if BANNED_PATTERN.search(expr):
                      hits.append(f"{name} — expression: {expr}")
                      continue
                  inner = lic.get('license', {})
                  # Field 2: license.id (SPDX identifier)
                  lic_id = inner.get('id', '') or ''
                  if lic_id in BANNED_SPDX:
                      hits.append(f"{name} — id: {lic_id}")
                      continue
                  # Field 3: license.name (free-form; use pattern match)
                  lic_name = inner.get('name', '') or ''
                  if BANNED_PATTERN.search(lic_name):
                      hits.append(f"{name} — name: {lic_name}")

          if hits:
              print("VIOLATIONS FOUND:")
              for h in hits:
                  print(f"  {h}")
              sys.exit(1)

          print(f"PASS: no GPL/AGPL detected ({len(sbom.get('components', []))} components scanned)")
          PYEOF

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-eie-${{ github.sha }}
          path: artifacts/sbom-eie.json
          retention-days: 90

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# END OF SUPPLY CHAIN SECURITY
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
