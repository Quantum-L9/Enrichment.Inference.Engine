name: L9 Contract Control

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  classify:
    name: Classify PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      pr_class: ${{ steps.classify.outputs.pr_class }}
      app_changed: ${{ steps.classify.outputs.app_changed }}
      workflows_changed: ${{ steps.classify.outputs.workflows_changed }}
      contracts_changed: ${{ steps.classify.outputs.contracts_changed }}
      security_sensitive_changed: ${{ steps.classify.outputs.security_sensitive_changed }}
      transport_sensitive_changed: ${{ steps.classify.outputs.transport_sensitive_changed }}
      ingress_sensitive_changed: ${{ steps.classify.outputs.ingress_sensitive_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Classify changed files
        id: classify
        run: python3 .github/scripts/classify_pr.py

  constitution-and-attestation:
    name: Constitution + Attestation
    runs-on: ubuntu-latest
    needs:
      - classify
    if: needs.classify.outputs.pr_class != 'docs_only'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install control dependencies
        env:
          SDK_TOKEN: ${{ secrets.SDK_TOKEN }}
        run: |
          if [ -z "${SDK_TOKEN}" ]; then
            echo "SDK_TOKEN is required to install private SDK dependencies"
            exit 1
          fi
          git config --global url."https://x-access-token:${SDK_TOKEN}@github.com/cryptoxdog/".insteadOf "https://github.com/cryptoxdog/"
          python -m pip install --upgrade pip
          python -m pip install pyyaml pytest pytest-cov fastapi
          if [ -f requirements-ci.txt ]; then
            python -m pip install -r requirements-ci.txt
          fi
          if [ -f "pyproject.toml" ]; then
            python -m pip install -e . --no-deps
          fi

      - name: Verify constitution
        run: |
          python scripts/l9_contract_control.py verify-constitution

      - name: Verify attestation
        if: >-
          needs.classify.outputs.pr_class != 'ci_workflow' &&
          (
            needs.classify.outputs.app_changed == 'true' ||
            needs.classify.outputs.contracts_changed == 'true' ||
            needs.classify.outputs.security_sensitive_changed == 'true' ||
            needs.classify.outputs.transport_sensitive_changed == 'true' ||
            needs.classify.outputs.ingress_sensitive_changed == 'true'
          )
        run: |
          python scripts/l9_contract_control.py verify-attestation || {
            if python -c "import app" 2>/dev/null; then
              exit 1
            else
              echo "[l9-control] SKIP: app module not installed, attestation verification skipped"
              exit 0
            fi
          }

  review-signal:
    name: Review Signal
    if: >-
      github.event_name == 'pull_request' &&
      needs.classify.outputs.pr_class != 'docs_only'
    runs-on: ubuntu-latest
    needs:
      - classify
      - constitution-and-attestation
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install review dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Emit review signal
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.sha }}
          PR_CLASS: ${{ needs.classify.outputs.pr_class }}
        run: |
          echo "PR class: ${PR_CLASS}"
          python scripts/l9_contract_control.py review-signal --base "$BASE_REF" --head "$HEAD_REF" | tee review_signal.md
          cat review_signal.md >> "$GITHUB_STEP_SUMMARY"

  select-and-run-gates:
    name: Select and Run Gates
    runs-on: ubuntu-latest
    needs:
      - classify
      - constitution-and-attestation
    if: >-
      needs.classify.outputs.pr_class != 'docs_only' &&
      needs.classify.outputs.pr_class != 'ci_workflow'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gate dependencies
        env:
          SDK_TOKEN: ${{ secrets.SDK_TOKEN }}
        run: |
          if [ -z "${SDK_TOKEN}" ]; then
            echo "SDK_TOKEN is required to install private SDK dependencies"
            exit 1
          fi
          git config --global url."https://x-access-token:${SDK_TOKEN}@github.com/cryptoxdog/".insteadOf "https://github.com/cryptoxdog/"
          python -m pip install --upgrade pip
          python -m pip install pyyaml pytest pytest-cov fastapi
          if [ -f requirements-ci.txt ]; then
            python -m pip install -r requirements-ci.txt
          fi
          if [ -f "pyproject.toml" ]; then
            python -m pip install -e . --no-deps
          fi

      - name: Compute changed files
        id: changed
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          FILES="$(git diff --name-only "$BASE" "$HEAD" | tr '\n' ' ')"
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Select gates
        id: gates
        shell: bash
        run: |
          python scripts/l9_contract_control.py select-gates --files ${{ steps.changed.outputs.files }} > gates.json
          cat gates.json
          echo "json=$(python - <<'PY'
          import json
          print(json.dumps(json.load(open('gates.json'))))
          PY
          )" >> "$GITHUB_OUTPUT"

      - name: Run selected commands
        shell: bash
        run: |
          python - <<'PY'
          import json
          import subprocess

          payload = json.load(open('gates.json'))
          commands = payload.get('commands', [])
          if not commands:
              print('[l9-control] no matching gates selected')
              raise SystemExit(0)

          seen = set()
          ordered = []
          for command in commands:
              if command not in seen:
                  seen.add(command)
                  ordered.append(command)

          for command in ordered:
              print(f'[l9-control] running: {command}')
              completed = subprocess.run(command, shell=True)
              if completed.returncode != 0:
                  raise SystemExit(completed.returncode)
          PY