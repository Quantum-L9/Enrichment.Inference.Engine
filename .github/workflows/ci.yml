name: CI Pipeline

on:
  push:
    branches:
      - ${{ vars.PRIMARY_BRANCH || 'main' }}
      - ${{ vars.DEVELOP_BRANCH || 'develop' }}
  pull_request:
    branches:
      - ${{ vars.PRIMARY_BRANCH || 'main' }}
      - ${{ vars.DEVELOP_BRANCH || 'develop' }}
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION || '3.12' }}
  REQUIREMENTS_FILE: ${{ vars.REQUIREMENTS_FILE || 'requirements.txt' }}
  COVERAGE_THRESHOLD: ${{ vars.COVERAGE_THRESHOLD || '60' }}
  TEST_DIR: ${{ vars.TEST_DIR || 'tests/' }}
  SOURCE_DIR: ${{ vars.SOURCE_DIR || 'app' }}

jobs:
  validate:
    name: Validate Structure
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements-ci.txt
            pyproject.toml
      - name: Install Validation Tools
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      - name: Check Python Syntax
        run: |
          find . -name "*.py" \
            -not -path "./venv/*" \
            -not -path "./.venv/*" \
            -not -path "./__pycache__/*" \
            -not -path "./build/*" \
            -not -path "./dist/*" \
            -exec python -m py_compile {} +
      - name: Validate YAML Files
        run: |
          python3 - <<'PY'
          import sys
          from pathlib import Path
          import yaml
          errors = []
          for path in Path('.github/workflows').glob('*.yml'):
              try:
                  yaml.safe_load(path.read_text())
              except yaml.YAMLError as exc:
                  errors.append(f'{path}: {exc}')
          for path in Path('kb').glob('*.yaml') if Path('kb').exists() else []:
              try:
                  data = yaml.safe_load(path.read_text())
                  if not isinstance(data, dict):
                      errors.append(f'{path}: not a YAML mapping')
              except yaml.YAMLError as exc:
                  errors.append(f'{path}: {exc}')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          PY

  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements-ci.txt
            pyproject.toml
      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
      - name: Run Ruff Linter
        run: ruff check . --output-format=github
      - name: Run Ruff Formatter Check
        run: ruff format --check .
      - name: Run Mypy Type Checker
        run: |
          mypy ${{ env.SOURCE_DIR }} \
            --show-error-codes \
            --pretty \
            --install-types \
            --non-interactive \
            --ignore-missing-imports \
            || echo "Type check warnings are non-blocking"

  semgrep:
    name: Semgrep Policy Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Install Semgrep
        run: pip install semgrep
      - name: Run Semgrep
        run: semgrep --config .semgrep/ --error --quiet

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements-ci.txt
            pyproject.toml
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || true
          if [ -f "${{ env.REQUIREMENTS_FILE }}" ]; then
            pip install -r ${{ env.REQUIREMENTS_FILE }}
          fi
      - name: Run Tests with Coverage
        env:
          TESTING: "true"
        run: |
          PYTHONPATH=. pytest ${{ env.TEST_DIR }} \
            -n auto \
            --cov=${{ env.SOURCE_DIR }} \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=${{ env.COVERAGE_THRESHOLD }} \
            --timeout=300 \
            --tb=short \
            -v
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate
    permissions:
      contents: read
      security-events: write
      pull-requests: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install Security Tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
      - name: Run pip-audit
        run: pip-audit --desc
      - name: Run Safety Check
        run: safety check || echo "Safety warnings are non-blocking"
      - name: Run Bandit
        run: |
          bandit -r ${{ env.SOURCE_DIR }} \
            -ll \
            -f screen \
            --exclude ./venv,./.venv,./tests,./build,./dist \
            || echo "Bandit warnings are non-blocking"
      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Generate Software Bill of Materials
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true
          upload-release-assets: false

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@v2
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true
      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scorecard.sarif

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs:
      - validate
      - lint
      - semgrep
      - test
      - security
      - sbom
      - scorecard
    permissions:
      contents: read
    steps:
      - name: Evaluate All Results
        run: |
          echo "CI Pipeline Results"
          echo "validate:  ${{ needs.validate.result }}"
          echo "lint:      ${{ needs.lint.result }}"
          echo "semgrep:   ${{ needs.semgrep.result }}"
          echo "test:      ${{ needs.test.result }}"
          echo "security:  ${{ needs.security.result }}"
          echo "sbom:      ${{ needs.sbom.result }}"
          echo "scorecard: ${{ needs.scorecard.result }}"
          if [[ "${{ needs.validate.result }}" == "failure" ]] || \
             [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.semgrep.result }}" == "failure" ]] || \
             [[ "${{ needs.test.result }}" == "failure" ]] || \
             [[ "${{ needs.security.result }}" == "failure" ]]; then
            echo "CI gate failed"
            exit 1
          fi
          echo "CI gate passed"
